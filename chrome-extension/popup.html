<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ToneLayer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <img src="icons/icon48.png" alt="" class="brand-icon">
        <div>
          <h1>ToneLayer</h1>
          <p id="modeSubtitle">ND to NT</p>
        </div>
      </div>
      <button id="loadSelection" class="icon-button" title="Load selected text">↙</button>
    </header>

    <nav class="mode-tabs" aria-label="ToneLayer tools">
      <button class="mode-tab active" data-mode="rewrite">ND→NT</button>
      <button class="mode-tab" data-mode="decode">Decoder</button>
      <button class="mode-tab" data-mode="ntnd">NT→ND</button>
    </nav>

    <section class="controls" aria-label="Tool settings">
      <label id="profileControl">
        <span>Profile</span>
        <select id="profile">
          <option>General ND</option>
          <option>ADHD</option>
          <option>Autism</option>
          <option>AUDHD</option>
          <option>PTSD</option>
          <option>CPTSD</option>
        </select>
      </label>

      <label id="contactControl" class="hidden">
        <span>Contact</span>
        <input id="contact" type="text" placeholder="Optional">
      </label>

      <div id="levelGroup" class="level-group" aria-label="Rewrite level">
        <button class="level" data-level="Light">Light</button>
        <button class="level active" data-level="Medium">Medium</button>
        <button class="level" data-level="Strong">Strong</button>
      </div>

      <div id="sensitivityGroup" class="level-group hidden" aria-label="Decoder sensitivity">
        <button class="sensitivity" data-sensitivity="Light">Light</button>
        <button class="sensitivity active" data-sensitivity="Medium">Medium</button>
        <button class="sensitivity" data-sensitivity="Strong">Strong</button>
      </div>
    </section>

    <label class="field">
      <span id="inputLabel">Original</span>
      <textarea id="input" rows="6" placeholder="Select text on a page, then open ToneLayer."></textarea>
    </label>

    <button id="run" class="primary">Rewrite</button>

    <section id="resultPanel" class="result hidden" aria-live="polite">
      <label class="field">
        <span id="outputLabel">Rewrite</span>
        <textarea id="output" rows="6"></textarea>
      </label>

      <div class="actions">
        <button id="copy">Copy</button>
        <button id="replace">Replace selection</button>
      </div>

      <div id="metaPanel" class="meta hidden"></div>

      <div id="teaching" class="teaching hidden">
        <h2 id="teachingTitle">Why this change</h2>
        <p id="explanation"></p>
      </div>
    </section>

    <p id="status" class="status"></p>
    <footer class="legal">© 2026 Alden Lougee. ToneLayer™ and the butterfly mark are trademarks of Alden Lougee.</footer>
  </main>
  <script src="popup.js"></script>
</body>
</html>
